services:
  verdaccio:
    container_name: lg-infra-verdaccio
    image: verdaccio/verdaccio:5
    restart: unless-stopped
    ports:
      - "${VERDACCIO_PORT:-4873}:4873"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./config.yaml:/verdaccio/conf/config.yaml:ro
      - ./htpasswd:/verdaccio/conf/htpasswd
      - verdaccio_storage:/verdaccio/storage
    networks:
      - lg-internal
    healthcheck:
      # localhost resolves IPv6-first on Alpine; Verdaccio listens IPv4 only.
      # Use 127.0.0.1 explicitly to avoid ECONNREFUSED on ::1.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4873/-/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lg-internal:
    external: true

volumes:
  verdaccio_storage:
    driver: local
